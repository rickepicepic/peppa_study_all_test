name: ci

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "tests/**"
      - "apps/api-go/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/ci.yml"
      - ".github/workflows/docs-deploy.yml"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build workspace
        run: pnpm build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api-go/go.mod

      - name: Run api tests
        run: |
          cd apps/api-go
          go test ./...
