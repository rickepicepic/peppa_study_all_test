name: api-ci

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "apps/api-go/**"
      - ".github/workflows/api-ci.yml"

jobs:
  verify-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api-go/go.mod

      - name: Run api tests
        run: |
          cd apps/api-go
          go test ./...
