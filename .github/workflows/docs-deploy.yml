name: docs-deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/docs/**"
      - "packages/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/docs-deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Validate deploy variables
        env:
          VITE_BACKEND_MODE: ${{ vars.VITE_BACKEND_MODE }}
          VITE_API_ENABLED: ${{ vars.VITE_API_ENABLED }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AUTH_ENABLED: ${{ vars.VITE_AUTH_ENABLED }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_GUEST_USER_ID: ${{ vars.VITE_SUPABASE_GUEST_USER_ID }}
        run: |
          if [ -z "$VITE_BACKEND_MODE" ]; then
            echo "VITE_BACKEND_MODE is not configured in repository variables"
            exit 1
          fi

          if [ "$VITE_BACKEND_MODE" = "api" ] && [ -z "$VITE_API_BASE_URL" ]; then
            echo "VITE_API_BASE_URL is required when VITE_BACKEND_MODE=api"
            exit 1
          fi

          if [ "$VITE_BACKEND_MODE" = "supabase" ] && [ -z "$VITE_SUPABASE_URL" ]; then
            echo "VITE_SUPABASE_URL is required when VITE_BACKEND_MODE=supabase"
            exit 1
          fi

          if [ "$VITE_BACKEND_MODE" = "supabase" ] && [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "VITE_SUPABASE_ANON_KEY is required when VITE_BACKEND_MODE=supabase"
            exit 1
          fi

          if [ "$VITE_BACKEND_MODE" != "api" ] && [ "$VITE_BACKEND_MODE" != "supabase" ] && [ "$VITE_BACKEND_MODE" != "local" ]; then
            echo "VITE_BACKEND_MODE must be one of: local, api, supabase"
            exit 1
          fi

      - name: Build docs
        env:
          VITE_BACKEND_MODE: ${{ vars.VITE_BACKEND_MODE }}
          VITE_API_ENABLED: ${{ vars.VITE_API_ENABLED }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AUTH_ENABLED: ${{ vars.VITE_AUTH_ENABLED }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_GUEST_USER_ID: ${{ vars.VITE_SUPABASE_GUEST_USER_ID }}
        run: pnpm --filter @nfp/docs build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
