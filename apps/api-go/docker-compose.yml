services:
  mysql:
    image: mysql:8.4
    container_name: nlp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nlp
      MYSQL_USER: nlp
      MYSQL_PASSWORD: nlp
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
